# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/rag_eval.yml
#
# Automated RAG Evaluation Pipeline — CI Quality Gate
#
# Triggers on every Pull Request. Evaluates the RAG pipeline against
# the golden dataset, posts a formatted score table as a PR comment,
# and blocks the merge if any metric drops below its threshold.
#
# Required GitHub Secrets:
#   GROQ_API_KEY       — Groq API key (free at console.groq.com)
#   HF_TOKEN           — Hugging Face token (for private datasets; public needs none)
#   GRAFANA_URL        — Grafana Cloud Influx write endpoint
#   GRAFANA_USER       — Grafana Cloud instance user ID
#   GRAFANA_API_KEY    — Grafana Cloud API token (MetricsPublisher scope)
# ─────────────────────────────────────────────────────────────────────────────

name: RAG Evaluation Pipeline

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]   # Also run on merge for baseline tracking
  workflow_dispatch:               # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pull-requests: write             # Needed to post PR comments
  issues: write

jobs:
  rag-evaluation:
    name: "🤖 RAG Quality Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 30            # Hard cap — Groq is fast but evaluation takes time

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_USER: ${{ secrets.GRAFANA_USER }}
      GRAFANA_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      # Force HuggingFace to use offline cache in CI for embeddings
      TRANSFORMERS_OFFLINE: "0"
      HF_DATASETS_OFFLINE: "0"

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python Setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip ─────────────────────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Cache HuggingFace models (embeddings) ─────────────────────────────
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-all-MiniLM-L6-v2
          restore-keys: |
            ${{ runner.os }}-hf-models-

      # ── 5. Install Package ───────────────────────────────────────────────────
      - name: Install rag-eval package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          echo "✅ rag-eval installed successfully"
          rag-eval --version

      # ── 6. Validate API Key ──────────────────────────────────────────────────
      - name: Validate environment secrets
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "❌ GROQ_API_KEY secret not set. Add it in Settings → Secrets → Actions"
            exit 1
          fi
          echo "✅ Required secrets validated"

      # ── 7. Run Evaluation (continue on error to post PR comment regardless) ──
      - name: Run RAG evaluation pipeline
        id: eval
        continue-on-error: true   # We handle the exit code manually in step 10
        run: |
          rag-eval run \
            --config eval_config.yaml \
            --output eval_report.json \
            --pr-number "$PR_NUMBER" \
            --push-grafana \
            --no-fail-on-gate \
            --verbose
          echo "eval_exit_code=0" >> $GITHUB_OUTPUT
        env:
          EVAL_FAIL: "false"

      # Capture actual exit code for gate decision
      - name: Capture evaluation result
        id: gate
        if: always()
        run: |
          if [ -f eval_report.json ]; then
            OVERALL_PASS=$(python -c "import json; d=json.load(open('eval_report.json')); print(str(d.get('overall_pass','false')).lower())")
            echo "overall_pass=$OVERALL_PASS" >> $GITHUB_OUTPUT
            echo "report_exists=true" >> $GITHUB_OUTPUT

            # Print summary to CI log
            echo ""
            echo "=== Evaluation Result Summary ==="
            python -c "
          import json
          d = json.load(open('eval_report.json'))
          print(f\"  Faithfulness:      {d.get('faithfulness', 0):.4f}\")
          print(f\"  Context Relevance: {d.get('context_relevance', 0):.4f}\")
          print(f\"  Answer Correctness:{d.get('answer_correctness', 0):.4f}\")
          print(f\"  Token Efficiency:  {d.get('token_efficiency', 0):.4f}\")
          print(f\"  Overall: {'PASSED' if d.get('overall_pass') else 'FAILED'}\")
          "
          else
            echo "overall_pass=false" >> $GITHUB_OUTPUT
            echo "report_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  eval_report.json not found — evaluation likely crashed"
          fi

      # ── 8. Post PR Comment ───────────────────────────────────────────────────
      - name: Post evaluation results as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let commentBody;

            // Try to read the pre-generated PR comment from rag-eval
            if (fs.existsSync('pr_comment.md')) {
              commentBody = fs.readFileSync('pr_comment.md', 'utf8');
            } else if (fs.existsSync('eval_report.json')) {
              // Fallback: generate a simple comment from the JSON
              const report = JSON.parse(fs.readFileSync('eval_report.json', 'utf8'));
              const pass = (v, t) => v >= t ? '✅' : '❌';
              commentBody = `## 🤖 RAG Evaluation Report — PR #${context.issue.number}

            ${report.overall_pass ? '## ✅ RAG Quality Gate: PASSED' : '## ❌ RAG Quality Gate: BLOCKED'}

            | Metric | Score | Threshold | Status |
            |--------|-------|-----------|--------|
            | 🎯 Faithfulness | \`${(report.faithfulness||0).toFixed(4)}\` | ≥ 0.75 | ${pass(report.faithfulness, 0.75)} |
            | 🔍 Context Relevance | \`${(report.context_relevance||0).toFixed(4)}\` | ≥ 0.70 | ${pass(report.context_relevance, 0.70)} |
            | ✔️ Answer Correctness | \`${(report.answer_correctness||0).toFixed(4)}\` | ≥ 0.65 | ${pass(report.answer_correctness, 0.65)} |
            | ⚡ Token Efficiency | \`${(report.token_efficiency||0).toFixed(4)}\` | ≥ 0.50 | ${pass(report.token_efficiency, 0.50)} |

            *Judge: \`${report.judge_model||'N/A'}\` · Dataset: \`${report.dataset_repo||'local'}\` · Samples: ${report.num_samples||0}*`;
            } else {
              commentBody = `## ❌ RAG Evaluation Pipeline Failed

            The evaluation script crashed before producing a report. Check the GitHub Actions logs for details.

            **Common causes:**
            - \`GROQ_API_KEY\` secret not set
            - HF Hub dataset not accessible
            - Import error in the package`;
            }

            // Find existing bot comment to update instead of creating duplicates
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🤖 RAG Evaluation Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody,
              });
              console.log(`Updated existing PR comment (ID: ${botComment.id})`);
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody,
              });
              console.log('Created new PR comment');
            }

      # ── 9. Upload report as CI artifact ─────────────────────────────────────
      - name: Upload evaluation report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-report-${{ github.run_number }}
          path: |
            eval_report.json
            pr_comment.md
          retention-days: 90       # Keep for 90 days for trend analysis

      # ── 10. Fail the workflow if regression gate triggered ───────────────────
      # This is the KEY STEP — this is what blocks the PR from merging
      - name: Enforce regression gate
        if: always()
        run: |
          OVERALL_PASS="${{ steps.gate.outputs.overall_pass }}"
          REPORT_EXISTS="${{ steps.gate.outputs.report_exists }}"

          echo "Gate decision: overall_pass=$OVERALL_PASS, report_exists=$REPORT_EXISTS"

          if [ "$REPORT_EXISTS" = "false" ]; then
            echo "❌ Evaluation report not found. Marking as failed."
            exit 1
          fi

          if [ "$OVERALL_PASS" = "true" ]; then
            echo "✅ All metrics above thresholds. PR is cleared for merge."
            exit 0
          else
            echo "❌ One or more metrics below threshold. Blocking PR merge."
            echo "   Fix the failing metrics and push a new commit to re-trigger evaluation."
            exit 1
          fi
